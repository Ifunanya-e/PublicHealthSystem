<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Public Health System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                <i data-feather="activity"></i>
            </div>
            <h1 class="text-2xl font-bold text-center text-slate-800">Health Data Portal</h1>
            <p class="text-slate-500 text-sm text-center mt-2">Sign in to manage and analyze public health records.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
            <div class="p-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-sm text-center">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" required
                       class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-3 rounded-lg transition-colors">
                Access System
            </button>
        </form>
    </div>

    <script>
        feather.replace()
    </script>
</body>
</html>
